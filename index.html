<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">  
</head>
<body>
    <p class = intro> Welcome! This is my humble Rock-Paper-Scissors Game.</p>
    <p>You will be playing against a randomly choosing CPU. First to 5 wins!</p>
    <button class = btnRock>Rock</button>
    <button class = btnPaper>Paper</button>
    <button class = btnScissors>Scissors</button>
    <div class = choices></div>
    <div class = resultsMessages></div>
    <div class = results></div>
    <div class = winner></div>
    <button class = btnReset>Reset</button>
    <script defer src = "javascript.js"></script>
</body>
</html>
